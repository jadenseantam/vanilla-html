<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <input type="text" name="output" id="output" class="output" readonly>
        <div class="btn-container">
            <button class="func span-three" id="AC">AC</button>
            <button class="btn" id="divide">/</button>
            <button class="btn" id="7">7</button>
            <button class="btn" id="8">8</button>
            <button class="btn" id="9">9</button>
            <button class="btn" id="multiply">*</button> <!-- Corrected ID -->
            <button class="btn" id="4">4</button>
            <button class="btn" id="5">5</button>
            <button class="btn" id="6">6</button>
            <button class="btn" id="minus">-</button>
            <button class="btn" id="1">1</button>
            <button class="btn" id="2">2</button>
            <button class="btn" id="3">3</button>
            <button class="btn" id="plus">+</button>
            <button class="btn" id="period">.</button>
            <button class="btn" id="0">0</button>
            <button class="func span-two" id="equal">=</button>/*  */
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
